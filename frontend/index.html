<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ORBE — Graph Portfolio Optimizer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --green-deep: #1a3a1a;
  --green-forest: #2d5016;
  --green-mid: #3d6b24;
  --green-sage: #6b8f4e;
  --green-light: #8ba872;
  --green-pale: #c8dbb0;
  --beige-dark: #b8a88c;
  --beige: #d4c5a9;
  --beige-light: #e8dcc8;
  --cream: #f5f0e8;
  --cream-light: #faf7f0;
  --cream-white: #fffcf5;
  --brown-dark: #2c2c1e;
  --gold: #b8a04e;
  --gold-light: #d4c070;
  --red-muted: #a85a4a;
  --blue-muted: #4a6a8a;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--cream-light);
  color: var(--brown-dark);
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--cream); }
::-webkit-scrollbar-thumb { background: var(--beige-dark); border-radius: 3px; }

/* ── Animations ── */
@keyframes fadeUp {
  from { opacity:0; transform: translateY(30px); }
  to { opacity:1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity:0; }
  to { opacity:1; }
}
@keyframes slideRight {
  from { opacity:0; transform: translateX(-40px); }
  to { opacity:1; transform: translateX(0); }
}
@keyframes scaleIn {
  from { opacity:0; transform: scale(0.85); }
  to { opacity:1; transform: scale(1); }
}
@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}
@keyframes float {
  0%,100% { transform: translateY(0px); }
  50% { transform: translateY(-12px); }
}
@keyframes pulse {
  0%,100% { opacity: 0.6; }
  50% { opacity: 1; }
}
@keyframes growBar {
  from { transform: scaleX(0); }
  to { transform: scaleX(1); }
}
@keyframes countUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes rotateGlobe {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
@keyframes borderGlow {
  0%,100% { border-color: var(--green-pale); }
  50% { border-color: var(--green-sage); }
}

.anim-fade-up { animation: fadeUp 0.7s ease both; }
.anim-fade-in { animation: fadeIn 0.6s ease both; }
.anim-slide-r { animation: slideRight 0.6s ease both; }
.anim-scale { animation: scaleIn 0.5s ease both; }
.delay-1 { animation-delay: 0.1s; }
.delay-2 { animation-delay: 0.2s; }
.delay-3 { animation-delay: 0.3s; }
.delay-4 { animation-delay: 0.4s; }
.delay-5 { animation-delay: 0.5s; }
.delay-6 { animation-delay: 0.6s; }
.delay-7 { animation-delay: 0.7s; }
.delay-8 { animation-delay: 0.8s; }

/* ── Layout ── */
.app-container {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Navbar ── */
.navbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 1000;
  padding: 0 40px;
  height: 72px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(250,247,240,0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(180,170,150,0.2);
  transition: all 0.3s ease;
}
.navbar.scrolled {
  box-shadow: 0 4px 30px rgba(44,44,30,0.06);
}
.nav-logo {
  font-family: 'Playfair Display', serif;
  font-size: 24px;
  font-weight: 700;
  color: var(--green-forest);
  letter-spacing: 2px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
}
.nav-logo-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--green-sage);
  animation: pulse 2s ease infinite;
}
.nav-links {
  display: flex;
  gap: 8px;
}
.nav-link {
  padding: 8px 20px;
  border-radius: 24px;
  font-size: 14px;
  font-weight: 500;
  color: var(--brown-dark);
  cursor: pointer;
  transition: all 0.3s ease;
  border: 1px solid transparent;
  letter-spacing: 0.3px;
}
.nav-link:hover {
  background: var(--cream);
  border-color: var(--beige);
}
.nav-link.active {
  background: var(--green-forest);
  color: var(--cream-white);
  border-color: var(--green-forest);
}

/* ── Page container ── */
.page {
  margin-top: 72px;
  padding: 40px;
  min-height: calc(100vh - 72px);
  animation: fadeIn 0.4s ease;
}

/* ── Hero Section (Home) ── */
.hero {
  min-height: calc(100vh - 72px);
  display: flex;
  align-items: center;
  position: relative;
  overflow: hidden;
  margin-top: 72px;
  padding: 0 60px;
}
.hero-bg {
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, var(--cream-white) 0%, var(--cream) 30%, var(--beige-light) 60%, var(--green-pale) 100%);
  z-index: 0;
}
.hero-bg::before {
  content: '';
  position: absolute;
  top: -50%;
  right: -20%;
  width: 800px;
  height: 800px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(107,143,78,0.12) 0%, transparent 70%);
  animation: float 8s ease-in-out infinite;
}
.hero-bg::after {
  content: '';
  position: absolute;
  bottom: -30%;
  left: -10%;
  width: 600px;
  height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(212,192,112,0.1) 0%, transparent 70%);
  animation: float 10s ease-in-out infinite 2s;
}
.hero-content {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 80px;
  align-items: center;
  width: 100%;
  max-width: 1400px;
  margin: 0 auto;
}
.hero-text h1 {
  font-family: 'Playfair Display', serif;
  font-size: 64px;
  font-weight: 700;
  line-height: 1.1;
  color: var(--green-deep);
  margin-bottom: 24px;
}
.hero-text h1 em {
  font-style: italic;
  color: var(--green-sage);
}
.hero-text p {
  font-size: 18px;
  line-height: 1.7;
  color: var(--beige-dark);
  max-width: 500px;
  margin-bottom: 36px;
  font-weight: 300;
}
.hero-cta {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  padding: 16px 36px;
  background: var(--green-forest);
  color: var(--cream-white);
  border: none;
  border-radius: 40px;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.4s ease;
  font-family: 'DM Sans', sans-serif;
  letter-spacing: 0.5px;
}
.hero-cta:hover {
  background: var(--green-mid);
  transform: translateY(-2px);
  box-shadow: 0 12px 36px rgba(45,80,22,0.25);
}
.hero-cta svg { transition: transform 0.3s ease; }
.hero-cta:hover svg { transform: translateX(4px); }

.hero-3d {
  width: 100%;
  height: 560px;
  position: relative;
}
#globe-canvas {
  width: 100%;
  height: 100%;
  border-radius: 20px;
}

/* ── Stats strip ── */
.stats-strip {
  position: relative;
  z-index: 1;
  display: flex;
  gap: 1px;
  background: rgba(180,170,150,0.15);
  border-radius: 20px;
  overflow: hidden;
  margin: -60px 60px 40px;
}
.stat-card {
  flex: 1;
  padding: 36px 32px;
  background: rgba(250,247,240,0.9);
  backdrop-filter: blur(10px);
  text-align: center;
}
.stat-card:first-child { border-radius: 20px 0 0 20px; }
.stat-card:last-child { border-radius: 0 20px 20px 0; }
.stat-value {
  font-family: 'Playfair Display', serif;
  font-size: 36px;
  font-weight: 700;
  color: var(--green-forest);
  margin-bottom: 8px;
}
.stat-label {
  font-size: 13px;
  color: var(--beige-dark);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  font-weight: 500;
}

/* ── Section Headers ── */
.section-header {
  margin-bottom: 32px;
}
.section-header h2 {
  font-family: 'Playfair Display', serif;
  font-size: 36px;
  color: var(--green-deep);
  margin-bottom: 8px;
}
.section-header p {
  color: var(--beige-dark);
  font-size: 16px;
  font-weight: 300;
}

/* ── Cards ── */
.card {
  background: var(--cream-white);
  border: 1px solid rgba(180,170,150,0.2);
  border-radius: 16px;
  padding: 28px;
  transition: all 0.4s ease;
}
.card:hover {
  border-color: var(--green-pale);
  box-shadow: 0 8px 32px rgba(44,44,30,0.06);
}
.card-header {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  color: var(--green-deep);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.card-icon {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
}
.card-icon.green { background: rgba(107,143,78,0.12); color: var(--green-sage); }
.card-icon.gold { background: rgba(184,160,78,0.12); color: var(--gold); }
.card-icon.red { background: rgba(168,90,74,0.12); color: var(--red-muted); }
.card-icon.blue { background: rgba(74,106,138,0.12); color: var(--blue-muted); }

/* ── Dashboard Grid ── */
.dashboard-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
  margin-bottom: 32px;
}
.metric-card {
  background: var(--cream-white);
  border: 1px solid rgba(180,170,150,0.15);
  border-radius: 16px;
  padding: 24px;
  position: relative;
  overflow: hidden;
  transition: all 0.4s ease;
}
.metric-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--green-sage), var(--gold-light));
  transform: scaleX(0);
  transition: transform 0.4s ease;
  transform-origin: left;
}
.metric-card:hover::before { transform: scaleX(1); }
.metric-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 36px rgba(44,44,30,0.08);
}
.metric-label {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--beige-dark);
  font-weight: 500;
  margin-bottom: 12px;
}
.metric-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 28px;
  font-weight: 500;
  color: var(--green-forest);
}
.metric-value.positive { color: var(--green-sage); }
.metric-value.negative { color: var(--red-muted); }

/* ── Charts ── */
.chart-container {
  background: var(--cream-white);
  border: 1px solid rgba(180,170,150,0.15);
  border-radius: 16px;
  padding: 28px;
  margin-bottom: 24px;
}
.chart-title {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  color: var(--green-deep);
  margin-bottom: 20px;
}
.chart-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
  margin-bottom: 24px;
}

/* ── Weight Bars ── */
.weight-bar-container {
  margin-bottom: 14px;
}
.weight-bar-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}
.weight-ticker {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 500;
  color: var(--brown-dark);
}
.weight-pct {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--beige-dark);
}
.weight-bar-track {
  height: 8px;
  background: var(--cream);
  border-radius: 4px;
  overflow: hidden;
}
.weight-bar-fill {
  height: 100%;
  border-radius: 4px;
  transform-origin: left;
  animation: growBar 1s ease both;
  transition: background 0.3s ease;
}
.cluster-badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 500;
  margin-left: 8px;
}

/* ── Heatmap ── */
.heatmap-canvas {
  width: 100%;
  border-radius: 8px;
}

/* ── Network Graph ── */
.network-canvas {
  width: 100%;
  height: 600px;
  background: var(--cream-white);
  border-radius: 12px;
  border: 1px solid rgba(180,170,150,0.15);
}

/* ── Frontier ── */
.frontier-canvas {
  width: 100%;
  height: 450px;
}

/* ── Cluster Cards ── */
.cluster-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}
.cluster-card {
  background: var(--cream-white);
  border: 1px solid rgba(180,170,150,0.15);
  border-radius: 14px;
  padding: 24px;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}
.cluster-card::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 3px;
}
.cluster-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 28px rgba(44,44,30,0.06);
}
.cluster-name {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  color: var(--green-deep);
  margin-bottom: 12px;
}
.cluster-members {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 16px;
}
.member-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  padding: 4px 10px;
  border-radius: 8px;
  background: var(--cream);
  color: var(--brown-dark);
  border: 1px solid rgba(180,170,150,0.2);
}
.cluster-weight {
  font-family: 'JetBrains Mono', monospace;
  font-size: 24px;
  font-weight: 500;
  color: var(--green-forest);
}

/* ── Loading ── */
.loading-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: calc(100vh - 72px);
  gap: 24px;
}
.loading-spinner {
  width: 48px;
  height: 48px;
  border: 3px solid var(--cream);
  border-top-color: var(--green-sage);
  border-radius: 50%;
  animation: rotateGlobe 1s linear infinite;
}
.loading-text {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  color: var(--beige-dark);
}

/* ── Portfolio Value Chart ── */
.sparkline-container {
  position: relative;
}

/* ── Table ── */
.data-table {
  width: 100%;
  border-collapse: collapse;
}
.data-table th {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--beige-dark);
  font-weight: 500;
  padding: 12px 16px;
  border-bottom: 1px solid rgba(180,170,150,0.2);
  text-align: left;
}
.data-table td {
  padding: 14px 16px;
  font-size: 14px;
  border-bottom: 1px solid rgba(180,170,150,0.08);
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
}
.data-table tr { transition: background 0.2s ease; }
.data-table tr:hover { background: rgba(107,143,78,0.04); }

/* ── Footer ── */
.footer {
  padding: 40px 60px;
  text-align: center;
  color: var(--beige-dark);
  font-size: 13px;
  border-top: 1px solid rgba(180,170,150,0.15);
  margin-top: 60px;
}
.footer a {
  color: var(--green-sage);
  text-decoration: none;
}

/* ── Responsive ── */
@media (max-width: 1024px) {
  .hero-content { grid-template-columns: 1fr; gap: 40px; }
  .hero-3d { height: 350px; }
  .hero-text h1 { font-size: 44px; }
  .dashboard-grid { grid-template-columns: repeat(2, 1fr); }
  .chart-grid { grid-template-columns: 1fr; }
  .cluster-grid { grid-template-columns: repeat(2, 1fr); }
  .stats-strip { margin: -40px 30px 30px; flex-wrap: wrap; }
}
@media (max-width: 640px) {
  .navbar { padding: 0 20px; }
  .page { padding: 20px; }
  .hero { padding: 0 20px; }
  .dashboard-grid { grid-template-columns: 1fr; }
  .cluster-grid { grid-template-columns: 1fr; }
  .stats-strip { margin: -20px 20px 20px; }
}
</style>

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ── API ──
const API_BASE = window.location.origin + "/api";

async function fetchAPI(endpoint) {
  const res = await fetch(`${API_BASE}/${endpoint}`);
  return res.json();
}

// ── Color Helpers ──
const CLUSTER_COLORS = [
  '#6b8f4e', '#b8a04e', '#a85a4a', '#4a6a8a', '#8b6b4e', '#5a7a6a',
  '#7a6b8f', '#8fa86b', '#6a8b9a', '#9a7a5a'
];
const CLUSTER_BG = [
  'rgba(107,143,78,0.1)', 'rgba(184,160,78,0.1)', 'rgba(168,90,74,0.1)',
  'rgba(74,106,138,0.1)', 'rgba(139,107,78,0.1)', 'rgba(90,122,106,0.1)',
];

function clusterColor(i) { return CLUSTER_COLORS[i % CLUSTER_COLORS.length]; }
function clusterBg(i) { return CLUSTER_BG[i % CLUSTER_BG.length]; }

// ── Format Helpers ──
function pct(v, d=2) { return (v * 100).toFixed(d) + '%'; }
function fmt(v, d=4) { return Number(v).toFixed(d); }

// ── Animated Number ──
function AnimNumber({ value, format = 'pct', duration = 1200, decimals = 2 }) {
  const [display, setDisplay] = useState(0);
  const ref = useRef(null);

  useEffect(() => {
    let start = null;
    const target = Number(value);
    function step(ts) {
      if (!start) start = ts;
      const progress = Math.min((ts - start) / duration, 1);
      const ease = 1 - Math.pow(1 - progress, 3);
      setDisplay(target * ease);
      if (progress < 1) ref.current = requestAnimationFrame(step);
    }
    ref.current = requestAnimationFrame(step);
    return () => cancelAnimationFrame(ref.current);
  }, [value, duration]);

  if (format === 'pct') return <span>{(display * 100).toFixed(decimals)}%</span>;
  if (format === 'num') return <span>{display.toFixed(decimals)}</span>;
  if (format === 'int') return <span>{Math.round(display)}</span>;
  if (format === 'dollar') return <span>${display.toLocaleString(undefined, { maximumFractionDigits: 0 })}</span>;
  return <span>{display.toFixed(decimals)}</span>;
}

// ── Three.js Globe ──
function Globe3D() {
  const mountRef = useRef(null);
  const sceneRef = useRef({});

  useEffect(() => {
    const mount = mountRef.current;
    if (!mount) return;
    const w = mount.clientWidth;
    const h = mount.clientHeight;

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(50, w / h, 0.1, 1000);
    camera.position.z = 5;

    const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
    renderer.setSize(w, h);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    mount.appendChild(renderer.domElement);

    // Sphere wireframe
    const sphereGeo = new THREE.IcosahedronGeometry(1.8, 2);
    const sphereMat = new THREE.MeshBasicMaterial({
      color: 0x6b8f4e, wireframe: true, transparent: true, opacity: 0.15,
    });
    const sphere = new THREE.Mesh(sphereGeo, sphereMat);
    scene.add(sphere);

    // Data points on sphere
    const pointsGeo = new THREE.BufferGeometry();
    const positions = [];
    const colors = [];
    const clrArr = [
      [0.42, 0.56, 0.31], [0.72, 0.63, 0.31], [0.66, 0.35, 0.29],
      [0.29, 0.42, 0.54], [0.55, 0.42, 0.31],
    ];
    for (let i = 0; i < 200; i++) {
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      const r = 1.8 + (Math.random() - 0.5) * 0.3;
      positions.push(
        r * Math.sin(phi) * Math.cos(theta),
        r * Math.sin(phi) * Math.sin(theta),
        r * Math.cos(phi)
      );
      const c = clrArr[i % clrArr.length];
      colors.push(c[0], c[1], c[2]);
    }
    pointsGeo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    pointsGeo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
    const pointsMat = new THREE.PointsMaterial({
      size: 0.06, vertexColors: true, transparent: true, opacity: 0.8,
    });
    const points = new THREE.Points(pointsGeo, pointsMat);
    scene.add(points);

    // Connection lines
    const linePositions = [];
    const posArr = pointsGeo.attributes.position.array;
    for (let i = 0; i < 60; i++) {
      const a = Math.floor(Math.random() * 200) * 3;
      const b = Math.floor(Math.random() * 200) * 3;
      linePositions.push(posArr[a], posArr[a+1], posArr[a+2]);
      linePositions.push(posArr[b], posArr[b+1], posArr[b+2]);
    }
    const lineGeo = new THREE.BufferGeometry();
    lineGeo.setAttribute('position', new THREE.Float32BufferAttribute(linePositions, 3));
    const lineMat = new THREE.LineBasicMaterial({
      color: 0xb8a04e, transparent: true, opacity: 0.08,
    });
    const lines = new THREE.LineSegments(lineGeo, lineMat);
    scene.add(lines);

    // Inner glow sphere
    const glowGeo = new THREE.SphereGeometry(1.2, 32, 32);
    const glowMat = new THREE.MeshBasicMaterial({
      color: 0xc8dbb0, transparent: true, opacity: 0.05,
    });
    scene.add(new THREE.Mesh(glowGeo, glowMat));

    let animId;
    function animate() {
      animId = requestAnimationFrame(animate);
      sphere.rotation.y += 0.002;
      sphere.rotation.x += 0.001;
      points.rotation.y += 0.002;
      points.rotation.x += 0.001;
      lines.rotation.y += 0.002;
      lines.rotation.x += 0.001;
      renderer.render(scene, camera);
    }
    animate();

    sceneRef.current = { renderer, animId };

    const handleResize = () => {
      const nw = mount.clientWidth;
      const nh = mount.clientHeight;
      camera.aspect = nw / nh;
      camera.updateProjectionMatrix();
      renderer.setSize(nw, nh);
    };
    window.addEventListener('resize', handleResize);

    return () => {
      cancelAnimationFrame(animId);
      window.removeEventListener('resize', handleResize);
      if (mount.contains(renderer.domElement)) mount.removeChild(renderer.domElement);
      renderer.dispose();
    };
  }, []);

  return <div ref={mountRef} id="globe-canvas" />;
}

// ── Canvas Heatmap ──
function Heatmap({ data }) {
  const canvasRef = useRef(null);

  useEffect(() => {
    if (!data || !canvasRef.current) return;
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');
    const n = data.tickers.length;
    const cellSize = Math.min(32, Math.floor(600 / n));
    const labelW = 60;
    const size = n * cellSize + labelW;
    canvas.width = size;
    canvas.height = size;

    function corrColor(v) {
      if (v >= 0) {
        const t = v;
        const r = Math.round(107 + (245 - 107) * (1 - t));
        const g = Math.round(143 + (240 - 143) * (1 - t));
        const b = Math.round(78 + (232 - 78) * (1 - t));
        return `rgb(${r},${g},${b})`;
      } else {
        const t = -v;
        const r = Math.round(245 - (245 - 168) * t);
        const g = Math.round(240 - (240 - 90) * t);
        const b = Math.round(232 - (232 - 74) * t);
        return `rgb(${r},${g},${b})`;
      }
    }

    ctx.fillStyle = '#fffcf5';
    ctx.fillRect(0, 0, size, size);

    for (let i = 0; i < n; i++) {
      for (let j = 0; j < n; j++) {
        const v = data.values[i][j];
        ctx.fillStyle = corrColor(v);
        ctx.fillRect(labelW + j * cellSize, labelW + i * cellSize, cellSize - 1, cellSize - 1);
        if (cellSize > 20) {
          ctx.fillStyle = Math.abs(v) > 0.5 ? '#fff' : '#2c2c1e';
          ctx.font = `${Math.max(8, cellSize * 0.32)}px JetBrains Mono`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(v.toFixed(2), labelW + j * cellSize + cellSize / 2, labelW + i * cellSize + cellSize / 2);
        }
      }
    }

    ctx.fillStyle = '#2c2c1e';
    ctx.font = `${Math.max(9, cellSize * 0.38)}px JetBrains Mono`;
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    for (let i = 0; i < n; i++) {
      ctx.fillText(data.tickers[i], labelW - 6, labelW + i * cellSize + cellSize / 2);
    }
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    for (let j = 0; j < n; j++) {
      ctx.save();
      ctx.translate(labelW + j * cellSize + cellSize / 2, labelW - 6);
      ctx.rotate(-Math.PI / 4);
      ctx.fillText(data.tickers[j], 0, 0);
      ctx.restore();
    }
  }, [data]);

  return <canvas ref={canvasRef} className="heatmap-canvas" style={{ maxWidth: '100%', height: 'auto' }} />;
}

// ── Canvas Frontier ──
function FrontierChart({ data }) {
  const canvasRef = useRef(null);

  useEffect(() => {
    if (!data || !canvasRef.current) return;
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');
    const W = canvas.parentElement.clientWidth;
    const H = 450;
    canvas.width = W * 2;
    canvas.height = H * 2;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.scale(2, 2);

    const pad = { top: 40, right: 40, bottom: 60, left: 80 };
    const cw = W - pad.left - pad.right;
    const ch = H - pad.top - pad.bottom;

    const allRisks = data.frontier.map(p => p.risk).concat(data.assets.map(a => a.risk)).concat([data.selected.risk]);
    const allRets = data.frontier.map(p => p.return).concat(data.assets.map(a => a.return)).concat([data.selected.return]);
    const xMin = Math.min(...allRisks) * 0.9;
    const xMax = Math.max(...allRisks) * 1.1;
    const yMin = Math.min(...allRets) * 0.9;
    const yMax = Math.max(...allRets) * 1.1;

    function tx(v) { return pad.left + ((v - xMin) / (xMax - xMin)) * cw; }
    function ty(v) { return pad.top + ch - ((v - yMin) / (yMax - yMin)) * ch; }

    // Background
    ctx.fillStyle = '#fffcf5';
    ctx.fillRect(0, 0, W, H);

    // Grid
    ctx.strokeStyle = 'rgba(180,170,150,0.15)';
    ctx.lineWidth = 1;
    for (let i = 0; i <= 5; i++) {
      const yv = yMin + (yMax - yMin) * i / 5;
      const y = ty(yv);
      ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
      ctx.fillStyle = '#b8a88c';
      ctx.font = '11px JetBrains Mono';
      ctx.textAlign = 'right';
      ctx.fillText((yv * 100).toFixed(1) + '%', pad.left - 8, y + 4);
    }
    for (let i = 0; i <= 5; i++) {
      const xv = xMin + (xMax - xMin) * i / 5;
      const x = tx(xv);
      ctx.beginPath(); ctx.moveTo(x, pad.top); ctx.lineTo(x, H - pad.bottom); ctx.stroke();
      ctx.fillStyle = '#b8a88c';
      ctx.textAlign = 'center';
      ctx.fillText((xv * 100).toFixed(1) + '%', x, H - pad.bottom + 20);
    }

    // Axis labels
    ctx.fillStyle = '#2c2c1e';
    ctx.font = '13px DM Sans';
    ctx.textAlign = 'center';
    ctx.fillText('Annualized Volatility', W / 2, H - 10);
    ctx.save();
    ctx.translate(18, H / 2);
    ctx.rotate(-Math.PI / 2);
    ctx.fillText('Annualized Return', 0, 0);
    ctx.restore();

    // Frontier curve
    if (data.frontier.length > 0) {
      const grad = ctx.createLinearGradient(pad.left, 0, W - pad.right, 0);
      grad.addColorStop(0, '#6b8f4e');
      grad.addColorStop(1, '#b8a04e');
      ctx.strokeStyle = grad;
      ctx.lineWidth = 3;
      ctx.beginPath();
      data.frontier.forEach((p, i) => {
        const x = tx(p.risk), y = ty(p.return);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.stroke();

      // Fill under curve
      ctx.globalAlpha = 0.06;
      ctx.fillStyle = '#6b8f4e';
      ctx.lineTo(tx(data.frontier[data.frontier.length - 1].risk), H - pad.bottom);
      ctx.lineTo(tx(data.frontier[0].risk), H - pad.bottom);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    // Individual assets
    data.assets.forEach(a => {
      ctx.fillStyle = clusterColor(a.cluster);
      ctx.globalAlpha = 0.5;
      ctx.beginPath();
      ctx.arc(tx(a.risk), ty(a.return), 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      ctx.fillStyle = '#2c2c1e';
      ctx.font = '10px JetBrains Mono';
      ctx.textAlign = 'center';
      ctx.fillText(a.ticker, tx(a.risk), ty(a.return) - 10);
    });

    // Selected portfolio
    ctx.fillStyle = '#a85a4a';
    ctx.beginPath();
    const sx = tx(data.selected.risk), sy = ty(data.selected.return);
    // Star shape
    for (let i = 0; i < 10; i++) {
      const r = i % 2 === 0 ? 10 : 5;
      const angle = (i * Math.PI / 5) - Math.PI / 2;
      const px = sx + r * Math.cos(angle);
      const py = sy + r * Math.sin(angle);
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = '#a85a4a';
    ctx.font = 'bold 11px DM Sans';
    ctx.textAlign = 'left';
    ctx.fillText(`Portfolio (${(data.selected.return * 100).toFixed(1)}%, ${(data.selected.risk * 100).toFixed(1)}%)`, sx + 14, sy + 4);
  }, [data]);

  return <canvas ref={canvasRef} className="frontier-canvas" />;
}

// ── Canvas Network Graph ──
function NetworkGraph({ data }) {
  const canvasRef = useRef(null);
  const [hovered, setHovered] = useState(null);

  useEffect(() => {
    if (!data || !canvasRef.current) return;
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');
    const W = canvas.parentElement.clientWidth;
    const H = 600;
    canvas.width = W * 2;
    canvas.height = H * 2;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.scale(2, 2);

    const pad = 80;
    const cw = W - pad * 2;
    const ch = H - pad * 2;

    const xs = data.nodes.map(n => n.x);
    const ys = data.nodes.map(n => n.y);
    const xMin = Math.min(...xs), xMax = Math.max(...xs);
    const yMin = Math.min(...ys), yMax = Math.max(...ys);
    const xRange = xMax - xMin || 1;
    const yRange = yMax - yMin || 1;

    function tx(v) { return pad + ((v - xMin) / xRange) * cw; }
    function ty(v) { return pad + ((v - yMin) / yRange) * ch; }

    ctx.fillStyle = '#fffcf5';
    ctx.fillRect(0, 0, W, H);

    // Edges
    data.edges.forEach(e => {
      const src = data.nodes.find(n => n.id === e.source);
      const tgt = data.nodes.find(n => n.id === e.target);
      if (!src || !tgt) return;
      const alpha = Math.max(0.1, 1 - e.weight);
      ctx.strokeStyle = `rgba(180,170,150,${alpha * 0.5})`;
      ctx.lineWidth = Math.max(1, (2 - e.weight) * 2);
      ctx.beginPath();
      ctx.moveTo(tx(src.x), ty(src.y));
      ctx.lineTo(tx(tgt.x), ty(tgt.y));
      ctx.stroke();
    });

    // Nodes
    data.nodes.forEach(n => {
      const x = tx(n.x), y = ty(n.y);
      const r = 12 + n.weight * 200;

      // Glow
      const glow = ctx.createRadialGradient(x, y, r * 0.5, x, y, r * 2.5);
      glow.addColorStop(0, clusterColor(n.cluster) + '20');
      glow.addColorStop(1, 'transparent');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(x, y, r * 2.5, 0, Math.PI * 2);
      ctx.fill();

      // Node circle
      ctx.fillStyle = clusterColor(n.cluster);
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = '#fffcf5';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Label
      ctx.fillStyle = '#2c2c1e';
      ctx.font = 'bold 11px JetBrains Mono';
      ctx.textAlign = 'center';
      ctx.fillText(n.id, x, y - r - 8);

      ctx.fillStyle = '#b8a88c';
      ctx.font = '10px JetBrains Mono';
      ctx.fillText(pct(n.weight, 1), x, y - r - 20);
    });

    // Legend
    const clusters = [...new Set(data.nodes.map(n => n.cluster))].sort();
    clusters.forEach((c, i) => {
      ctx.fillStyle = clusterColor(c);
      ctx.beginPath();
      ctx.arc(W - 140, 30 + i * 24, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#2c2c1e';
      ctx.font = '12px DM Sans';
      ctx.textAlign = 'left';
      ctx.fillText(`Cluster ${c}`, W - 126, 34 + i * 24);
    });
  }, [data]);

  return <canvas ref={canvasRef} className="network-canvas" />;
}

// ── Portfolio Line Chart (Canvas) ──
function PortfolioChart({ data }) {
  const canvasRef = useRef(null);

  useEffect(() => {
    if (!data || !data.length || !canvasRef.current) return;
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');
    const W = canvas.parentElement.clientWidth;
    const H = 300;
    canvas.width = W * 2;
    canvas.height = H * 2;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.scale(2, 2);

    const pad = { top: 20, right: 20, bottom: 40, left: 70 };
    const cw = W - pad.left - pad.right;
    const ch = H - pad.top - pad.bottom;

    const vals = data.map(d => d.value);
    const yMin = Math.min(...vals) * 0.95;
    const yMax = Math.max(...vals) * 1.05;

    function tx(i) { return pad.left + (i / (data.length - 1)) * cw; }
    function ty(v) { return pad.top + ch - ((v - yMin) / (yMax - yMin)) * ch; }

    ctx.fillStyle = '#fffcf5';
    ctx.fillRect(0, 0, W, H);

    // Grid
    ctx.strokeStyle = 'rgba(180,170,150,0.12)';
    ctx.lineWidth = 1;
    for (let i = 0; i <= 4; i++) {
      const yv = yMin + (yMax - yMin) * i / 4;
      const y = ty(yv);
      ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
      ctx.fillStyle = '#b8a88c';
      ctx.font = '10px JetBrains Mono';
      ctx.textAlign = 'right';
      ctx.fillText('$' + yv.toLocaleString(undefined, { maximumFractionDigits: 0 }), pad.left - 8, y + 4);
    }

    // Date labels
    const labelStep = Math.floor(data.length / 5);
    for (let i = 0; i < data.length; i += labelStep) {
      ctx.fillStyle = '#b8a88c';
      ctx.font = '10px JetBrains Mono';
      ctx.textAlign = 'center';
      ctx.fillText(data[i].date.substring(0, 7), tx(i), H - pad.bottom + 18);
    }

    // Fill
    const grad = ctx.createLinearGradient(0, pad.top, 0, H - pad.bottom);
    grad.addColorStop(0, 'rgba(107,143,78,0.15)');
    grad.addColorStop(1, 'rgba(107,143,78,0.01)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(tx(0), H - pad.bottom);
    data.forEach((d, i) => ctx.lineTo(tx(i), ty(d.value)));
    ctx.lineTo(tx(data.length - 1), H - pad.bottom);
    ctx.closePath();
    ctx.fill();

    // Line
    const lineGrad = ctx.createLinearGradient(pad.left, 0, W - pad.right, 0);
    lineGrad.addColorStop(0, '#6b8f4e');
    lineGrad.addColorStop(1, '#3d6b24');
    ctx.strokeStyle = lineGrad;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    data.forEach((d, i) => {
      if (i === 0) ctx.moveTo(tx(i), ty(d.value));
      else ctx.lineTo(tx(i), ty(d.value));
    });
    ctx.stroke();

    // End dot
    const last = data[data.length - 1];
    ctx.fillStyle = '#3d6b24';
    ctx.beginPath();
    ctx.arc(tx(data.length - 1), ty(last.value), 4, 0, Math.PI * 2);
    ctx.fill();
  }, [data]);

  return <canvas ref={canvasRef} style={{ width: '100%', height: 300 }} />;
}

                  <span className="cluster-badge" style={{
                    background: clusterBg(w.cluster),
                    color: clusterColor(w.cluster),
                  }}>C{w.cluster}</span>
                </span>
                <span className="weight-pct">{pct(w.weight, 2)}</span>
              </div>
              <div className="weight-bar-track">
                <div className="weight-bar-fill" style={{
                  width: `${(w.weight / maxW) * 100}%`,
                  background: `linear-gradient(90deg, ${clusterColor(w.cluster)}, ${clusterColor(w.cluster)}88)`,
                  animationDelay: `${i * 0.05}s`,
                }} />
              </div>
            </div>
          ))}
        </div>

        <div className="card anim-fade-up delay-3">
          <div className="card-header">
            <div className="card-icon gold">T</div>
            Holdings Detail
          </div>
          <table className="data-table">
            <thead>
              <tr>
                <th>Ticker</th>
                <th>Weight</th>
                <th>Return</th>
                <th>Vol</th>
                <th>Cluster</th>
              </tr>
            </thead>
            <tbody>
              {weights.map(w => (
                <tr key={w.ticker}>
                  <td style={{ fontWeight: 600 }}>{w.ticker}</td>
                  <td>{pct(w.weight, 2)}</td>
                  <td style={{ color: w.annual_return >= 0 ? '#6b8f4e' : '#a85a4a' }}>
                    {pct(w.annual_return, 1)}
                  </td>
                  <td>{pct(w.annual_vol, 1)}</td>
                  <td>
                    <span className="cluster-badge" style={{
                      background: clusterBg(w.cluster),
                      color: clusterColor(w.cluster),
                    }}>{w.cluster}</span>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ── Analysis Page ──
function AnalysisPage({ correlation, frontier }) {
  if (!correlation || !frontier) return <Loading />;

  return (
    <div className="page">
      <div className="section-header anim-fade-up">
        <h2>Analysis</h2>
        <p>Correlation structure and risk-return optimization landscape</p>
      </div>

      <div className="chart-container anim-fade-up delay-1">
        <div className="chart-title">Efficient Frontier</div>
        <FrontierChart data={frontier} />
      </div>

      <div className="chart-container anim-fade-up delay-2">
        <div className="chart-title">Pearson Correlation Matrix</div>
        <Heatmap data={correlation} />
      </div>
    </div>
  );
}

// ── Network Page ──
function NetworkPage({ graph }) {
  if (!graph) return <Loading />;

  return (
    <div className="page">
      <div className="section-header anim-fade-up">
        <h2>Correlation Network</h2>
        <p>Minimum spanning tree of the asset distance graph — nodes sized by portfolio weight, colored by cluster</p>
      </div>

      <div className="chart-container anim-fade-up delay-1">
        <NetworkGraph data={graph} />
      </div>

      <div className="card anim-fade-up delay-2" style={{ marginTop: 16 }}>
        <div className="card-header">
          <div className="card-icon blue">E</div>
          Edge List (MST)
        </div>
        <table className="data-table">
          <thead>
            <tr>
              <th>Source</th>
              <th>Target</th>
              <th>Distance</th>
              <th>Implied Corr</th>
            </tr>
          </thead>
          <tbody>
            {graph.edges.sort((a, b) => a.weight - b.weight).map((e, i) => (
              <tr key={i}>
                <td style={{ fontWeight: 600 }}>{e.source}</td>
                <td style={{ fontWeight: 600 }}>{e.target}</td>
                <td>{e.weight.toFixed(4)}</td>
                <td style={{ color: '#6b8f4e' }}>{(1 - e.weight * e.weight / 2).toFixed(4)}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ── Loading ──
function Loading() {
  return (
    <div className="loading-container">
      <div className="loading-spinner" />
      <div className="loading-text">Optimizing portfolio…</div>
    </div>
  );
}

// ── Main App ──
function App() {
  const [page, setPage] = useState('home');
  const [overview, setOverview] = useState(null);
  const [weights, setWeights] = useState(null);
  const [correlation, setCorrelation] = useState(null);
  const [frontier, setFrontier] = useState(null);
  const [graph, setGraph] = useState(null);
  const [history, setHistory] = useState(null);

  useEffect(() => {
    fetchAPI('overview').then(setOverview).catch(console.error);
    fetchAPI('weights').then(setWeights).catch(console.error);
    fetchAPI('correlation').then(setCorrelation).catch(console.error);
    fetchAPI('frontier').then(setFrontier).catch(console.error);
    fetchAPI('graph').then(setGraph).catch(console.error);
    fetchAPI('portfolio-history').then(setHistory).catch(console.error);
  }, []);

  useEffect(() => { window.scrollTo(0, 0); }, [page]);

  return (
    <div className="app-container">
      <Navbar page={page} setPage={setPage} />

      {page === 'home' && <HomePage setPage={setPage} metrics={overview?.metrics} />}
      {page === 'dashboard' && <DashboardPage data={overview} />}
      {page === 'portfolio' && <PortfolioPage weights={weights} history={history} />}
      {page === 'analysis' && <AnalysisPage correlation={correlation} frontier={frontier} />}
      {page === 'network' && <NetworkPage graph={graph} />}

      <div className="footer">
        ORBE — Graph-Theoretic Portfolio Optimizer · Built with Python, Flask & React
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
